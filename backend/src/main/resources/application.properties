spring.application.name=backend

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.config.import=optional:classpath:application-local.properties

# This driver class is standard for all Postgres connections
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA SETTINGS
# ===============================

# "update" will automatically create tables in DBeaver when you run the Java app
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# SWAGGER CONFIGURATION
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.csrf.enabled=true

# ===============================
# MAIL CONFIGURATION (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# MQTT CONFIGURATION
# ===============================
# Replace with your MQTT broker's IP address or hostname.
# For local testing: tcp://localhost:1883
# For public test broker: tcp://test.mosquitto.org:1883
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=solara-backend

# ===============================
# EXPO PUSH CONFIGURATION
# ===============================
expo.push.url=https://exp.host/--/api/v2/push/send

