name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          script_stop: true
          script: |
            set -Eeuo pipefail

            export BRANCH="main"
            export APP_DIR="${{ secrets.VPS_APP_DIR }}"
            [ -n "${APP_DIR}" ] || (echo "Missing VPS_APP_DIR secret" && exit 1)

            mkdir -p "${APP_DIR}/chatbot"

            cat > "${APP_DIR}/.env" <<'EOF'
            ${{ secrets.APP_ENV_FILE }}
            EOF

            cat > "${APP_DIR}/chatbot/.env" <<'EOF'
            ${{ secrets.CHATBOT_ENV_FILE }}
            EOF

            bash "${APP_DIR}/scripts/deploy_vps.sh"
